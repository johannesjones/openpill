services:
  mongodb:
    image: mongo:7
    container_name: knowledge-pill-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo-init-rs.sh:/docker-entrypoint-initdb.d/init-rs.sh:ro
    environment:
      MONGO_INITDB_DATABASE: knowledge_pills_db
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    healthcheck:
      test: >
        mongosh --quiet --eval "
          try { rs.status().ok } catch(e) {
            rs.initiate({_id:'rs0', members:[{_id:0, host:'localhost:27017'}]});
            1;
          }
        "
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  mongo_data:
